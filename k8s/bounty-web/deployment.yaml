apiVersion: v1
kind: ServiceAccount
metadata:
  name: bounty-web
  namespace: tongagent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bounty-web
  namespace: tongagent
  labels:
    app: bounty-web
    tier: frontend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bounty-web
  template:
    metadata:
      labels:
        app: bounty-web
        tier: frontend
    spec:
      serviceAccountName: bounty-web
      imagePullSecrets:
        - name: harbor-cred
      containers:
        - name: web
          image: harbor.mybigai.ac.cn/tongos/bounty-web:v0.14.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          env:
            # Optional: point frontend at a specific API host (defaults to same-origin)
            - name: VITE_API_BASE_URL
              value: ""
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: bounty-web
  namespace: tongagent
  labels:
    app: bounty-web
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: bounty-web
