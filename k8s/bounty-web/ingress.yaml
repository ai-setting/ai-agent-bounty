# Ingress for bounty-web — exposes the frontend on a dedicated subdomain
# and proxies /api/* /ws /health to the bounty-server backend.
# (The / on `bounty.tongagents.example.com` is handled by the existing
# `bounty-ingress`; this manifest owns only the alt host.)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bounty-web-alt-ingress
  namespace: tongagent
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/websocket-services: bounty-server-lb
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bounty-web-alt-ingress
  namespace: tongagent
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/websocket-services: bounty-server-lb
spec:
  ingressClassName: nginx
  rules:
    - host: bounty-web.tongagents.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: bounty-server-lb
                port:
                  number: 4005
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: bounty-server-lb
                port:
                  number: 4005
          - path: /health
            pathType: Exact
            backend:
              service:
                name: bounty-server-lb
                port:
                  number: 4005
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bounty-web
                port:
                  number: 80
